<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divina Opção - Controle de Finanças</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel para JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Recharts -->
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  
  <!-- Framer Motion -->
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gold: {
              DEFAULT: '#D4AF37',
              light: '#FFD700',
              dark: '#B8860B',
            },
            black: {
              DEFAULT: '#0A0A0A',
              light: '#141414',
              lighter: '#1E1E1E',
            },
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #050505 0%, #0f0f0f 100%);
      min-height: 100vh;
      color: #D4AF37;
    }
    
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Cormorant Garamond', serif;
    }
    
    /* Scrollbar customizada */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    
    ::-webkit-scrollbar-track {
      background: #141414;
      border-radius: 4px;
    }
    
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #D4AF37, #B8860B);
      border-radius: 4px;
    }
    
    /* Card elegante */
    .card-elegant {
      background: linear-gradient(135deg, #141414 0%, #0a0a0a 100%);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }
    
    .card-elegant:hover {
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 175, 55, 0.1);
    }
    
    /* Input estilizado */
    .input-gold {
      width: 100%;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      color: #f5f5f5;
      font-size: 14px;
      transition: all 0.3s ease;
    }
    
    .input-gold:focus {
      outline: none;
      border-color: rgba(212, 175, 55, 0.7);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
    }
    
    .input-gold::placeholder {
      color: rgba(212, 175, 55, 0.4);
    }
    
    /* Animações */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(50px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
      50% { box-shadow: 0 0 40px rgba(212, 175, 55, 0.6); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .animate-slide-in {
      animation: slideIn 0.4s ease-out forwards;
    }
    
    /* Partículas */
    .particle {
      position: fixed;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #D4AF37;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 0 10px #D4AF37;
    }
    
    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.98);
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 12px;
      padding: 16px 24px;
      color: #D4AF37;
      z-index: 10000;
      animation: fadeIn 0.3s ease-out;
    }
    
    /* Safe area */
    .pb-safe {
      padding-bottom: env(safe-area-inset-bottom, 20px);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    const { motion, AnimatePresence } = window.Motion;
    const { 
      BarChart, Bar, LineChart, Line, PieChart, Pie, Cell, 
      XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ComposedChart, Area 
    } = window.Recharts;
    
    // ===== TIPOS E CONSTANTES =====
    const DEFAULT_EXPENSE_CATEGORIES = [
      { id: '1', name: 'Alimentação', color: '#D4AF37', type: 'expense' },
      { id: '2', name: 'Transporte', color: '#B8860B', type: 'expense' },

      { id: '4', name: 'Saúde', color: '#D2691E', type: 'expense' },

    const DEFAULT_INCOME_CATEGORIES = [
      { id: '1', name: 'Salário', color: '#FFD700', type: 'income' },
      { id: '2', name: 'Freelance', color: '#D4AF37', type: 'income' },
      { id: '3', name: 'Investimentos', color: '#F0E68C', type: 'income' },
      { id: '4', name: 'Presentes', color: '#EEE8AA', type: 'income' },
      { id: '5', name: 'Outros', color: '#FFEC8B', type: 'income' },
    ];
    
    const COLORS = ['#D4AF37', '#FFD700', '#B8860B', '#F0E68C', '#CD853F', '#D2691E', '#8B4513', '#BC8F8F'];
    
    // ===== ÍCONES (SVG) =====
    const Icons = {

          <polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/>

      ),
      BarChart3: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 3v16a2 2 0 0 0 2 2h16"/><rect x="15" y="5" width="4" height="12" rx="1"/>
          <rect x="7" y="8" width="4" height="9" rx="1"/>

      ),
      History: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>

        </svg>
      ),
      ArrowLeft: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>

      ),
      DollarSign: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="12" x2="12" y1="2" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
      ),
      Calendar: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/>
          <path d="M3 10h18"/>
        </svg>
      ),
      Tag: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/>
          <circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/>

      ),
      FileText: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/>
          <path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/>

      ),
      AlertCircle: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/>
          <line x1="12" x2="12.01" y1="16" y2="16"/>

      ),
      Plus: ({ className }) => (

      ),
      Search: ({ className }) => (

          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
        </svg>
      ),
      Filter: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
      ),
      Download: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/>
          <line x1="12" x2="12" y1="15" y2="3"/>
        </svg>
      ),
      RotateCcw: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
      ),
      Trash2: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
          <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          <line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>
        </svg>
      ),
      Edit2: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
        </svg>
      ),
      X: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="M18 6 6 18"/><path d="m6 6 12 12"/>
        </svg>
      ),
      AlertTriangle: ({ className }) => (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <path d="M12 9v4"/><path d="M12 17h.01"/>
        </svg>
      ),
    };
    
    // ===== HOOK DE FINANÇAS =====
    const useFinances = () => {
      const STORAGE_KEY = 'divina_opcao_finances_v2';
      
      const [expenses, setExpenses] = useState([]);
      const [incomes, setIncomes] = useState([]);
      const [expenseCategories, setExpenseCategories] = useState(DEFAULT_EXPENSE_CATEGORIES);
      const [incomeCategories, setIncomeCategories] = useState(DEFAULT_INCOME_CATEGORIES);
      const [isLoaded, setIsLoaded] = useState(false);
      
      // Carregar dados
      useEffect(() => {
        try {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (stored) {
            const data = JSON.parse(stored);
            setExpenses(data.expenses || []);
            setIncomes(data.incomes || []);
            setExpenseCategories(data.expenseCategories || DEFAULT_EXPENSE_CATEGORIES);
            setIncomeCategories(data.incomeCategories || DEFAULT_INCOME_CATEGORIES);
          }
        } catch (e) {
          console.error('Erro ao carregar:', e);
        }
        setIsLoaded(true);
      }, []);
      
      // Salvar dados
      useEffect(() => {
        if (isLoaded) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            expenses, incomes, expenseCategories, incomeCategories
          }));
        }
      }, [expenses, incomes, expenseCategories, incomeCategories, isLoaded]);
      
      const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2);
      
      const addExpense = (transaction) => {
        const newExpense = { ...transaction, id: generateId(), type: 'expense', createdAt: Date.now() };
        setExpenses(prev => [newExpense, ...prev]);
        return newExpense;
      };
      
      const addIncome = (transaction) => {
        const newIncome = { ...transaction, id: generateId(), type: 'income', createdAt: Date.now() };
        setIncomes(prev => [newIncome, ...prev]);
        return newIncome;
      };
      
      const removeTransaction = (id, type) => {
        if (type === 'expense') setExpenses(prev => prev.filter(e => e.id !== id));
        else setIncomes(prev => prev.filter(i => i.id !== id));
      };
      
      const editTransaction = (id, type, updates) => {
        if (type === 'expense') {
          setExpenses(prev => prev.map(e => e.id === id ? { ...e, ...updates } : e));
        } else {
          setIncomes(prev => prev.map(i => i.id === id ? { ...i, ...updates } : i));
        }
      };
      
      const addCategory = (category) => {
        const newCat = { ...category, id: generateId() };
        if (category.type === 'expense') setExpenseCategories(prev => [...prev, newCat]);
        else setIncomeCategories(prev => [...prev, newCat]);
        return newCat;
      };
      
      const resetAll = () => {
        setExpenses([]);
        setIncomes([]);
        setExpenseCategories(DEFAULT_EXPENSE_CATEGORIES);
        setIncomeCategories(DEFAULT_INCOME_CATEGORIES);
      };
      
      const getSummary = () => {
        const totalExpenses = expenses.reduce((sum, e) => sum + e.amount, 0);
        const totalIncomes = incomes.reduce((sum, i) => sum + i.amount, 0);
        const today = new Date().toISOString().split('T')[0];
        const currentMonth = today.substring(0, 7);
        
        return {
          totalExpenses,
          totalIncomes,
          balance: totalIncomes - totalExpenses,
          dailyExpenses: expenses.filter(e => e.date === today).reduce((sum, e) => sum + e.amount, 0),
          dailyIncomes: incomes.filter(i => i.date === today).reduce((sum, i) => sum + i.amount, 0),
          monthlyExpenses: expenses.filter(e => e.date.startsWith(currentMonth)).reduce((sum, e) => sum + e.amount, 0),
          monthlyIncomes: incomes.filter(i => i.date.startsWith(currentMonth)).reduce((sum, i) => sum + i.amount, 0),
        };
      };
      
      const getExpenseChartData = () => {
        const data = {};
        expenses.forEach(e => data[e.category] = (data[e.category] || 0) + e.amount);
        return Object.entries(data).map(([name, value]) => ({
          name, value, color: expenseCategories.find(c => c.name === name)?.color || '#D4AF37'
        })).sort((a, b) => b.value - a.value);
      };
      
      const getIncomeChartData = () => {
        const data = {};
        incomes.forEach(i => data[i.category] = (data[i.category] || 0) + i.amount);
        return Object.entries(data).map(([name, value]) => ({
          name, value, color: incomeCategories.find(c => c.name === name)?.color || '#FFD700'
        })).sort((a, b) => b.value - a.value);
      };
      
      const getTimelineData = () => {
        const dateMap = {};
        for (let i = 29; i >= 0; i--) {
          const date = new Date();
          date.setDate(date.getDate() - i);
          dateMap[date.toISOString().split('T')[0]] = { expenses: 0, incomes: 0 };
        }
        expenses.forEach(e => { if (dateMap[e.date]) dateMap[e.date].expenses += e.amount; });
        incomes.forEach(i => { if (dateMap[i.date]) dateMap[i.date].incomes += i.amount; });
        
        let balance = 0;
        return Object.entries(dateMap).map(([date, vals]) => {
          balance += vals.incomes - vals.expenses;
          return { date: date.substring(5), expenses: vals.expenses, incomes: vals.incomes, balance };
        });
      };
      
      const exportToCSV = () => {
        const headers = ['Tipo', 'Descrição', 'Valor', 'Data', 'Categoria', 'Notas'];
        const rows = [];
        expenses.forEach(e => rows.push(['Gasto', e.description, e.amount, e.date, e.category, e.notes || '']));
        incomes.forEach(i => rows.push(['Lucro', i.description, i.amount, i.date, i.category, i.notes || '']));
        const csv = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `financas_divina_opcao_${new Date().toISOString().split('T')[0]}.csv`;
        link.click();
      };
      
      const undoLastAction = () => {
        if (expenses.length > 0) {
          const last = expenses[0];
          removeTransaction(last.id, 'expense');
          return last;
        } else if (incomes.length > 0) {
          const last = incomes[0];
          removeTransaction(last.id, 'income');
          return last;
        }
        return null;
      };
      
      return {
        expenses, incomes, expenseCategories, incomeCategories, isLoaded,
        addExpense, addIncome, removeTransaction, editTransaction,
        addCategory, resetAll, getSummary, getExpenseChartData,
        getIncomeChartData, getTimelineData, exportToCSV, undoLastAction
      };
    };
    
    // ===== COMPONENTE: TOAST =====
    const Toast = ({ message, type, onClose }) => {
      useEffect(() => {
        const timer = setTimeout(onClose, 3000);
        return () => clearTimeout(timer);
      }, [onClose]);
      
      const bgColor = type === 'success' ? 'border-emerald-500/50' : type === 'error' ? 'border-rose-500/50' : 'border-amber-500/50';
      const textColor = type === 'success' ? 'text-emerald-400' : type === 'error' ? 'text-rose-400' : 'text-amber-400';
      
      return (
        <motion.div
          initial={{ opacity: 0, y: -50 }}
          animate={{ opacity: 1, y: 0 }}
          exit={{ opacity: 0, y: -50 }}
          className={`fixed top-4 left-1/2 -translate-x-1/2 z-[10000] bg-[#141414] border ${bgColor} rounded-xl px-6 py-4 shadow-xl`}
        >
          <p className={`${textColor} font-medium`}>{message}</p>
        </motion.div>
      );
    };
    
    // ===== COMPONENTE: WELCOME MENU =====
    const WelcomeMenu = ({ onStart }) => {
      const [showParticles, setShowParticles] = useState(false);
      
      const handleStart = () => {
        setShowParticles(true);
        setTimeout(onStart, 300);
      };
      
      const features = [
        { icon: Icons.Wallet, text: 'Controle seus gastos' },
        { icon: Icons.TrendingUp, text: 'Acompanhe seus lucros' },
        { icon: Icons.BarChart3, text: 'Visualize gráficos' },
        { icon: Icons.History, text: 'Histórico completo' },
      ];
      
      return (
        <motion.div
          className="min-h-screen flex flex-col items-center justify-center px-4 py-8 relative overflow-hidden"
          initial={{ opacity: 0 }}
          animate={{ opacity: 1 }}
          exit={{ opacity: 0, y: -50 }}
        >
          {/* Background */}
          <div className="absolute inset-0 overflow-hidden pointer-events-none">
            <motion.div

    const TransactionForm = ({ type, categories, onSubmit, onBack, onAddCategory, showToast }) => {

      const [category, setCategory] = useState('');
      const [notes, setNotes] = useState('');

      const [newCategoryName, setNewCategoryName] = useState('');
      
      const isExpense = type === 'expense';
      const title = isExpense ? 'Adicionar Gasto' : 'Adicionar Lucro';
      const accentColor = isExpense ? 'text-rose-400' : 'text-emerald-400';
      const btnGradient = isExpense ? 'from-rose-500 via-rose-400 to-rose-600' : 'from-emerald-500 via-emerald-400 to-emerald-600';
      
      useEffect(() => {
        if (categories.length > 0 && !category) setCategory(categories[0].name);
      }, [categories]);
      
      const validate = () => {
        const errs = {};
        if (!description.trim()) errs.description = 'Descrição é obrigatória';
        if (!amount || parseFloat(amount) <= 0) errs.amount = 'Valor deve ser maior que zero';
        if (!date) errs.date = 'Data é obrigatória';
        if (!category) errs.category = 'Categoria é obrigatória';
        setErrors(errs);
        return Object.keys(errs).length === 0;
      };
      
      const handleSubmit = (e) => {
        e.preventDefault();
        if (!validate()) return;
        onSubmit({
          description: description.trim(),
          amount: parseFloat(amount),
          date,
          category,
          notes: notes.trim(),
        });
        showToast(isExpense ? 'Gasto registrado!' : 'Lucro registrado!', 'success');
        setDescription('');
        setAmount('');
        setNotes('');
        setDate(new Date().toISOString().split('T')[0]);
      };
      
      const handleAddCat = () => {
        if (newCategoryName.trim()) {
          const colors = isExpense ? ['#D4AF37', '#B8860B', '#CD853F', '#D2691E'] : ['#FFD700', '#D4AF37', '#F0E68C', '#EEE8AA'];
          onAddCategory(newCategoryName.trim(), colors[Math.floor(Math.random() * colors.length)]);
          setNewCategoryName('');
          setShowNewCategory(false);
          showToast('Categoria adicionada!', 'success');
        }

          <div className="max-w-lg mx-auto">
            <form onSubmit={handleSubmit} className="space-y-5">
              {/* Descrição */}
              <div className="space-y-2">
                <label className="text-amber-200/80 text-sm font-medium flex items-center gap-2">
                  <Icons.FileText className="w-4 h-4" /> Descrição

                <input

                  value={description}
                  onChange={e => setDescription(e.target.value)}
                  placeholder="Ex: Mercado, Salário, etc."

                {errors.description && <p className="text-rose-400 text-sm flex items-center gap-1"><Icons.AlertCircle className="w-4 h-4" /> {errors.description}</p>}
              </div>
              
              {/* Valor */}

                <label className="text-amber-200/80 text-sm font-medium flex items-center gap-2">
                  <Icons.DollarSign className="w-4 h-4" /> Valor (R$)

                <div className="relative">

                    onChange={e => setAmount(e.target.value)}

                {errors.amount && <p className="text-rose-400 text-sm flex items-center gap-1"><Icons.AlertCircle className="w-4 h-4" /> {errors.amount}</p>}

              {/* Data */}

                  <Icons.Calendar className="w-4 h-4" /> Data
                </label>
                <input type="date" value={date} onChange={e => setDate(e.target.value)} className="input-gold" />
              </div>
              
              {/* Categoria */}
              <div className="space-y-2">
                <label className="text-amber-200/80 text-sm font-medium flex items-center gap-2">
                  <Icons.Tag className="w-4 h-4" /> Categoria
                </label>
                <div className="flex gap-2">
                  <select value={category} onChange={e => setCategory(e.target.value)} className="input-gold flex-1">
                    <option value="">Selecione...</option>
                    {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}

                  <button type="button" onClick={() => setShowNewCategory(!showNewCategory)} className="px-4 py-3 bg-amber-500/10 border border-amber-500/30 rounded-xl text-amber-400 hover:bg-amber-500/20">
                    <Icons.Plus className="w-5 h-5" />

                </span>
              </motion.button>
            </form>
          </div>
        </motion.div>
      );
    };

    const TransactionHistory = ({ type, transactions, categories, onBack, onDelete, onEdit, onExport, showToast }) => {

      const filtered = useMemo(() => {
        return transactions.filter(t => {
          const matchesSearch = t.description.toLowerCase().includes(searchTerm.toLowerCase());
          const matchesCategory = !filterCategory || t.category === filterCategory;
          const matchesDateFrom = !filterDateFrom || t.date >= filterDateFrom;
          const matchesDateTo = !filterDateTo || t.date <= filterDateTo;
          return matchesSearch && matchesCategory && matchesDateFrom && matchesDateTo;
        });
      }, [transactions, searchTerm, filterCategory, filterDateFrom, filterDateTo]);
      
      const total = filtered.reduce((sum, t) => sum + t.amount, 0);

      const formatDate = d => { const [y, m, day] = d.split('-'); return `${day}/${m}/${y}`; };
      
      const handleDelete = (id) => {
        onDelete(id);
        setDeleteConfirmId(null);
        showToast('Transação removida!', 'success');

                    <div className="flex gap-2">

                      <button onClick={() => handleDelete(t.id)} className="px-3 py-1 bg-rose-500/20 text-rose-400 rounded-lg text-sm"><Icons.Check className="w-4 h-4" /></button>
                    </div>

                    <div className="flex-1">

                        <h3 className="text-amber-100 font-medium">{t.description}</h3>

              <div className="card-elegant p-4">
                <div className="flex items-center gap-2 mb-2">
                  <Icons.Calendar className="w-4 h-4 text-amber-400" />
                  <span className="text-amber-200/60 text-xs">Hoje</span>
                </div>
                <div className="flex justify-between text-sm">
                  <span className="text-rose-400">{formatCurrency(summary.dailyExpenses)}</span>
                  <span className="text-emerald-400">{formatCurrency(summary.dailyIncomes)}</span>
                </div>
              </div>
            </div>
            
            {/* Gráfico de linha do tempo */}
            <div className="card-elegant">
              <h3 className="text-amber-200 font-semibold mb-4 flex items-center gap-2">
                <Icons.TrendingUp className="w-5 h-5 text-amber-400" /> Evolução (30 dias)
              </h3>
              <div className="h-64">
                <ResponsiveContainer width="100%" height="100%">
                  <ComposedChart data={timelineData}>
                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(212, 175, 55, 0.1)" />
                    <XAxis dataKey="date" stroke="rgba(212, 175, 55, 0.4)" tick={{ fill: 'rgba(212, 175, 55, 0.6)', fontSize: 12 }} />
                    <YAxis stroke="rgba(212, 175, 55, 0.4)" tick={{ fill: 'rgba(212, 175, 55, 0.6)', fontSize: 12 }} tickFormatter={v => `R$${v}`} />
                    <Tooltip content={<CustomTooltip />} />
                    <Legend wrapperStyle={{ color: 'rgba(212, 175, 55, 0.8)' }} />
                    <Bar dataKey="expenses" name="Gastos" fill="rgba(244, 63, 94, 0.6)" radius={[4, 4, 0, 0]} />
                    <Bar dataKey="incomes" name="Lucros" fill="rgba(16, 185, 129, 0.6)" radius={[4, 4, 0, 0]} />
                    <Line type="monotone" dataKey="balance" name="Saldo" stroke="#D4AF37" strokeWidth={2} dot={{ fill: '#D4AF37', strokeWidth: 0, r: 4 }} />
                  </ComposedChart>
                </ResponsiveContainer>
              </div>
            </div>
            
            {/* Gráficos de pizza */}
            <div className="grid md:grid-cols-2 gap-6">
              <div className="card-elegant">
                <h3 className="text-amber-200 font-semibold mb-4 flex items-center gap-2">
                  <Icons.TrendingDown className="w-5 h-5 text-rose-400" /> Gastos por Categoria
                </h3>
                <div className="h-56">
                  {expenseChartData.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie data={expenseChartData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={4} dataKey="value">
                          {expenseChartData.map((e, i) => <Cell key={`c-${i}`} fill={e.color || COLORS[i % COLORS.length]} stroke="rgba(0,0,0,0.5)" strokeWidth={2} />)}
                        </Pie>
                        <Tooltip formatter={v => formatCurrency(v)} contentStyle={{ background: 'rgba(10,10,10,0.95)', border: '1px solid rgba(212,175,55,0.5)', borderRadius: '12px' }} />
                        <Legend verticalAlign="bottom" height={36} formatter={v => <span style={{ color: 'rgba(212,175,55,0.8)' }}>{v}</span>} />
                      </PieChart>
                    </ResponsiveContainer>
                  ) : <div className="h-full flex items-center justify-center"><p className="text-amber-500/40 text-sm">Sem dados</p></div>}
                </div>
              </div>
              
              <div className="card-elegant">
                <h3 className="text-amber-200 font-semibold mb-4 flex items-center gap-2">
                  <Icons.TrendingUp className="w-5 h-5 text-emerald-400" /> Lucros por Categoria
                </h3>
                <div className="h-56">
                  {incomeChartData.length > 0 ? (
                    <ResponsiveContainer width="100%" height="100%">
                      <PieChart>
                        <Pie data={incomeChartData} cx="50%" cy="50%" innerRadius={50} outerRadius={80} paddingAngle={4} dataKey="value">
                          {incomeChartData.map((e, i) => <Cell key={`c-${i}`} fill={e.color || COLORS[i % COLORS.length]} stroke="rgba(0,0,0,0.5)" strokeWidth={2} />)}
                        </Pie>
                        <Tooltip formatter={v => formatCurrency(v)} contentStyle={{ background: 'rgba(10,10,10,0.95)', border: '1px solid rgba(212,175,55,0.5)', borderRadius: '12px' }} />
                        <Legend verticalAlign="bottom" height={36} formatter={v => <span style={{ color: 'rgba(212,175,55,0.8)' }}>{v}</span>} />
                      </PieChart>
                    </ResponsiveContainer>
                  ) : <div className="h-full flex items-center justify-center"><p className="text-amber-500/40 text-sm">Sem dados</p></div>}
                </div>
              </div>
            </div>
            
            {/* Resumo mensal */}
            <div className="card-elegant">
              <h3 className="text-amber-200 font-semibold mb-4 flex items-center gap-2">
                <Icons.DollarSign className="w-5 h-5 text-amber-400" /> Resumo do Mês
              </h3>
              <div className="grid grid-cols-3 gap-4">
                <div className="text-center p-4 bg-rose-500/10 rounded-xl">
                  <p className="text-rose-200/60 text-xs mb-1">Gastos</p>
                  <p className="text-xl font-bold font-mono text-rose-400">{formatCurrency(summary.monthlyExpenses)}</p>
                </div>
                <div className="text-center p-4 bg-emerald-500/10 rounded-xl">
                  <p className="text-emerald-200/60 text-xs mb-1">Lucros</p>
                  <p className="text-xl font-bold font-mono text-emerald-400">{formatCurrency(summary.monthlyIncomes)}</p>
                </div>
                <div className="text-center p-4 bg-amber-500/10 rounded-xl">
                  <p className="text-amber-200/60 text-xs mb-1">Balanço</p>
                  <p className={`text-xl font-bold font-mono ${summary.monthlyIncomes - summary.monthlyExpenses >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    {formatCurrency(summary.monthlyIncomes - summary.monthlyExpenses)}
                  </p>
                </div>
              </div>
            </div>
          </div>
          
          {/* Confirmação reset */}
          {showResetConfirm && (
            <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={() => setShowResetConfirm(false)}>
              <motion.div initial={{ scale: 0.9 }} animate={{ scale: 1 }} className="bg-neutral-900 border border-amber-500/30 rounded-2xl p-6 max-w-sm w-full" onClick={e => e.stopPropagation()}>
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-12 h-12 rounded-full bg-rose-500/20 flex items-center justify-center">
                    <Icons.AlertTriangle className="w-6 h-6 text-rose-400" />
                  </div>
                  <div>
                    <h3 className="text-amber-100 font-semibold">Resetar dados?</h3>
                    <p className="text-amber-200/60 text-sm">Esta ação não pode ser desfeita.</p>
                  </div>
                </div>
                <div className="flex gap-3">
                  <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 bg-amber-500/10 text-amber-400 rounded-xl font-medium hover:bg-amber-500/20">Cancelar</button>
                  <button onClick={handleReset} className="flex-1 py-3 bg-rose-500/20 text-rose-400 rounded-xl font-medium hover:bg-rose-500/30">Confirmar</button>
                </div>
              </motion.div>
            </div>
          )}
        </motion.div>
      );
    };
    
    // ===== COMPONENTE: BOTTOM DASHBOARD =====
    const BottomDashboard = ({ currentMenu, onMenuChange }) => {
      const menuItems = [
        { id: 'add-expense', label: 'Gasto', icon: Icons.TrendingDown, color: 'text-rose-400' },
        { id: 'add-income', label: 'Lucro', icon: Icons.TrendingUp, color: 'text-emerald-400' },
        { id: 'history-expense', label: 'Gastos', icon: Icons.History, color: 'text-rose-400' },
        { id: 'history-income', label: 'Lucros', icon: Icons.History, color: 'text-emerald-400' },
        { id: 'dashboard', label: 'Dashboard', icon: Icons.BarChart3, color: 'text-amber-400' },
      ];
      
      return (
        <motion.div
          className="fixed bottom-0 left-0 right-0 z-50 px-4 pb-safe"
          initial={{ y: 100 }}
          animate={{ y: 0 }}
          transition={{ type: 'spring', stiffness: 200, damping: 25 }}
        >
          <div className="max-w-lg mx-auto rounded-t-3xl px-4 py-3" style={{ background: 'linear-gradient(180deg, rgba(20,20,20,0.98) 0%, rgba(10,10,10,0.99) 100%)', borderTop: '2px solid rgba(212,175,55,0.4)', boxShadow: '0 -10px 40px rgba(0,0,0,0.5)' }}>
            <div className="flex justify-center mb-3"><div className="w-12 h-1 rounded-full bg-amber-500/30" /></div>
            <div className="flex justify-around items-center">
              {menuItems.map(item => {
                const Icon = item.icon;
                const active = currentMenu === item.id;
                return (
                  <button
                    key={item.id}
                    onClick={() => onMenuChange(item.id)}
                    className="relative flex flex-col items-center gap-1 p-2"
                  >
                    <div className={`relative p-3 rounded-2xl transition-all ${active ? 'bg-gradient-to-br from-amber-500/30 to-amber-600/20' : ''}`}>
                      {active && <div className="absolute inset-0 rounded-2xl animate-pulse" style={{ background: 'radial-gradient(circle, rgba(212,175,55,0.4) 0%, transparent 70%)' }} />}
                      <Icon className={`w-6 h-6 relative z-10 ${active ? item.color : 'text-amber-500/50'}`} />
                      {active && <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1.5 h-1.5 rounded-full bg-amber-400" />}
                    </div>
                    <span className={`text-xs font-medium ${active ? 'text-amber-300' : 'text-amber-500/40'}`}>{item.label}</span>
                  </button>
                );
              })}
            </div>
          </div>
        </motion.div>
      );
    };
    
    // ===== APP PRINCIPAL =====
    const App = () => {
      const [currentMenu, setCurrentMenu] = useState('welcome');
      const [showWelcome, setShowWelcome] = useState(true);
      const [toast, setToast] = useState(null);
      
      const {
        expenses, incomes, expenseCategories, incomeCategories, isLoaded,
        addExpense, addIncome, removeTransaction, editTransaction,
        addCategory, resetAll, getSummary, getExpenseChartData,
        getIncomeChartData, getTimelineData, exportToCSV, undoLastAction
      } = useFinances();
      
      useEffect(() => {
        const hasVisited = localStorage.getItem('divina_opcao_visited_v2');
        if (hasVisited) {
          setShowWelcome(false);
          setCurrentMenu('dashboard');
        }
      }, []);
      
      const showToastMsg = (message, type = 'success') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };
      
      const handleStart = () => {
        localStorage.setItem('divina_opcao_visited_v2', 'true');
        setShowWelcome(false);
        setCurrentMenu('dashboard');
        showToastMsg('Bem-vindo ao Divina Opção!');
      };
      
      const handleBack = () => setCurrentMenu('dashboard');
      
      const handleAddExpense = (data) => {
        addExpense(data);
        showToastMsg(`Gasto: ${data.description} - R$ ${data.amount.toFixed(2)}`);
      };
      
      const handleAddIncome = (data) => {
        addIncome(data);
        showToastMsg(`Lucro: ${data.description} - R$ ${data.amount.toFixed(2)}`);
      };
      
      const handleAddExpenseCat = (name, color) => addCategory({ name, color, type: 'expense' });
      const handleAddIncomeCat = (name, color) => addCategory({ name, color, type: 'income' });
      
      const handleDelete = (id, type) => {
        removeTransaction(id, type);
        showToastMsg('Transação removida!');
      };
      
      const handleEdit = (id, type, updates) => {
        editTransaction(id, type, updates);
        showToastMsg('Transação atualizada!');
      };
      
      const handleExport = () => {
        exportToCSV();
        showToastMsg('CSV exportado!');
      };
      
      const handleReset = () => {
        resetAll();
        showToastMsg('Dados resetados!');
      };
      
      if (!isLoaded) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-black">
            <div className="w-12 h-12 border-4 border-amber-500/30 border-t-amber-500 rounded-full animate-spin" />
          </div>
        );
      }
      
      const renderContent = () => {
        if (showWelcome) return <WelcomeMenu onStart={handleStart} />;
        
        switch (currentMenu) {
          case 'add-expense':
            return <TransactionForm type="expense" categories={expenseCategories} onSubmit={handleAddExpense} onBack={handleBack} onAddCategory={handleAddExpenseCat} showToast={showToastMsg} />;
          case 'add-income':
            return <TransactionForm type="income" categories={incomeCategories} onSubmit={handleAddIncome} onBack={handleBack} onAddCategory={handleAddIncomeCat} showToast={showToastMsg} />;
          case 'history-expense':
            return <TransactionHistory type="expense" transactions={expenses} categories={expenseCategories} onBack={handleBack} onDelete={id => handleDelete(id, 'expense')} onEdit={(id, u) => handleEdit(id, 'expense', u)} onExport={handleExport} showToast={showToastMsg} />;
          case 'history-income':
            return <TransactionHistory type="income" transactions={incomes} categories={incomeCategories} onBack={handleBack} onDelete={id => handleDelete(id, 'income')} onEdit={(id, u) => handleEdit(id, 'income', u)} onExport={handleExport} showToast={showToastMsg} />;
          case 'dashboard':
            return <Dashboard summary={getSummary()} expenseChartData={getExpenseChartData()} incomeChartData={getIncomeChartData()} timelineData={getTimelineData()} onBack={handleBack} onExport={handleExport} onReset={handleReset} showToast={showToastMsg} />;
          default:
            return null;
        }
      };
      
      return (
        <div className="min-h-screen bg-black text-amber-100 overflow-x-hidden">
          {/* Toast */}
          <AnimatePresence>
            {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
          </AnimatePresence>
          
          {/* Background */}
          {!showWelcome && (
            <div className="fixed inset-0 pointer-events-none overflow-hidden">
              <div className="absolute top-0 left-1/4 w-96 h-96 rounded-full opacity-20" style={{ background: 'radial-gradient(circle, rgba(212,175,55,0.3) 0%, transparent 70%)' }} />
              <div className="absolute bottom-1/4 right-1/4 w-64 h-64 rounded-full opacity-15" style={{ background: 'radial-gradient(circle, rgba(212,175,55,0.2) 0%, transparent 70%)' }} />
            </div>
          )}
          
          {/* Main */}
          <main className="relative z-10">
            <AnimatePresence mode="wait">
              {renderContent()}
            </AnimatePresence>
          </main>
          
          {/* Bottom Nav */}
          {!showWelcome && <BottomDashboard currentMenu={currentMenu} onMenuChange={setCurrentMenu} />}
          
          {/* Header */}
          {!showWelcome && (
            <header className="fixed top-0 left-0 right-0 z-40 px-4 py-3 bg-black/90 backdrop-blur-md border-b border-amber-500/20">
              <div className="max-w-4xl mx-auto flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 rounded-xl flex items-center justify-center" style={{ background: 'linear-gradient(135deg, rgba(212,175,55,0.2) 0%, rgba(184,134,11,0.1) 100%)', border: '1px solid rgba(212,175,55,0.4)' }}>
                    <span className="text-amber-400 font-serif font-bold text-lg">D</span>
                  </div>
                  <div>
                    <h1 className="text-amber-400 font-serif font-semibold text-lg">Divina Opção</h1>
                    <p className="text-amber-500/50 text-xs">
                      {currentMenu === 'dashboard' && 'Dashboard'}
                      {currentMenu === 'add-expense' && 'Adicionar Gasto'}
                      {currentMenu === 'add-income' && 'Adicionar Lucro'}
                      {currentMenu === 'history-expense' && 'Histórico de Gastos'}
                      {currentMenu === 'history-income' && 'Histórico de Lucros'}
                    </p>
                  </div>
                </div>
                <div className="hidden sm:block text-right">
                  <p className="text-amber-500/50 text-xs">Saldo</p>
                  <p className={`font-mono font-bold text-sm ${getSummary().balance >= 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                    R$ {getSummary().balance.toFixed(2)}
                  </p>
                </div>
              </div>
            </header>
          )}
        </div>
      );
    };
    
    // Render
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
